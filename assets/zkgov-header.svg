<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 260" role="img" aria-label="ZKGov — Anonymous Governance on HashKey Chain">
  <title>ZKGov — Anonymous Governance on HashKey Chain</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Brand logo gradient: #6366f1 → #4338ca -->
    <linearGradient id="logoBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="logoShield" x1="256" y1="80" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Brand accent for text/lines: dark mode #818cf8 -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Subtle node glow for right-side diagram -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="260" fill="url(#bg)"/>

  <!-- Subtle dot grid (brand border rgba(255,255,255,0.08)) -->
  <g fill="#ffffff" fill-opacity="0.05">
    <circle cx="20" cy="20" r="1.2"/><circle cx="60" cy="20" r="1.2"/><circle cx="100" cy="20" r="1.2"/><circle cx="140" cy="20" r="1.2"/>
    <circle cx="20" cy="60" r="1.2"/><circle cx="60" cy="60" r="1.2"/><circle cx="100" cy="60" r="1.2"/>
    <circle cx="20" cy="240" r="1.2"/><circle cx="60" cy="240" r="1.2"/><circle cx="100" cy="240" r="1.2"/><circle cx="140" cy="240" r="1.2"/>
    <circle cx="1260" cy="20" r="1.2"/><circle cx="1300" cy="20" r="1.2"/><circle cx="1340" cy="20" r="1.2"/><circle cx="1380" cy="20" r="1.2"/>
    <circle cx="1260" cy="240" r="1.2"/><circle cx="1300" cy="240" r="1.2"/><circle cx="1340" cy="240" r="1.2"/><circle cx="1380" cy="240" r="1.2"/>
  </g>

  <!-- ─── Logo (left) ─── -->
  <!-- Scaled to 72×72 at x=44, y=28 from the 512×512 source logo -->
  <svg x="44" y="28" width="72" height="72" viewBox="0 0 512 512" fill="none">
    <rect width="512" height="512" rx="96" fill="url(#logoBg)"/>
    <path d="M256 88 L392 148 L392 284 C392 360 332 416 256 440 C180 416 120 360 120 284 L120 148 Z" fill="url(#logoShield)"/>
    <path d="M192 192 L312 192 L312 216 L228 296 L312 296 L312 320 L192 320 L192 296 L276 216 L192 216 Z" fill="#4338ca"/>
    <circle cx="256" cy="156" r="14" fill="#4338ca" opacity="0.5"/>
    <path d="M340 168 L348 176 L368 152" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <!-- ─── Wordmark + tagline ─── -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#fafafa" letter-spacing="-1.5">ZKGov</text>
  <!-- Accent underline -->
  <line x1="130" y1="94" x2="270" y2="94" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <text x="130" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0" letter-spacing="-0.2">Anonymous Governance on HashKey Chain</text>
  <text x="130" y="156" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="400" fill="#71717a">Zero-knowledge voting — your vote is mathematically unlinkable to your identity.</text>
  <text x="130" y="175" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="12.5" font-weight="400" fill="#71717a">Humans and AI agents vote through the same Groth16-verified pipeline, indistinguishably.</text>

  <!-- ─── Badge row ─── -->
  <!-- Groth16 · ZK -->
  <rect x="130" y="195" width="90" height="22" rx="4" fill="#1e1b4b" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="175" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#818cf8">Groth16 · ZK</text>
  <!-- HashKey Chain 133 -->
  <rect x="228" y="195" width="118" height="22" rx="4" fill="#0f172a" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="287" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#93c5fd">HashKey Chain 133</text>
  <!-- Semaphore v4 -->
  <rect x="354" y="195" width="110" height="22" rx="4" fill="#13111e" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="409" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#a5b4fc">Semaphore v4</text>
  <!-- MCP · CLI · npm -->
  <rect x="472" y="195" width="100" height="22" rx="4" fill="#0d1f0d" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="522" y="210" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9.5" font-weight="700" fill="#4ade80">MCP · CLI · npm</text>

  <!-- ─── Right-side: Merkle membership proof visual ─── -->
  <line x1="1060" y1="20" x2="1060" y2="240" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <g transform="translate(1100, 20)">
    <!-- Glow behind root -->
    <circle cx="152" cy="52" r="36" fill="url(#nodeGlow)"/>

    <!-- Root node -->
    <circle cx="152" cy="52" r="20" fill="#111111" stroke="#6366f1" stroke-width="2"/>
    <text x="152" y="49" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="700" fill="#818cf8">merkle</text>
    <text x="152" y="61" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="700" fill="#818cf8">root</text>

    <!-- Level 1 nodes -->
    <circle cx="90" cy="120" r="16" fill="#111111" stroke="#4338ca" stroke-width="1.5"/>
    <text x="90" y="125" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#6366f1">H(01)</text>
    <circle cx="214" cy="120" r="16" fill="#111111" stroke="#4338ca" stroke-width="1.5"/>
    <text x="214" y="125" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#6366f1">H(10)</text>

    <!-- Leaf nodes -->
    <circle cx="52" cy="192" r="13" fill="#0e0e1a" stroke="#312e81" stroke-width="1"/>
    <text x="52" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#6366f1">id₁</text>
    <circle cx="128" cy="192" r="13" fill="#0e0e1a" stroke="#312e81" stroke-width="1"/>
    <text x="128" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#6366f1">id₂</text>
    <!-- "You" — highlighted leaf -->
    <circle cx="192" cy="192" r="16" fill="#1e1b4b" stroke="#818cf8" stroke-width="2.5"/>
    <text x="192" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" font-weight="700" fill="#c7d2fe">you</text>
    <circle cx="264" cy="192" r="13" fill="#0e0e1a" stroke="#312e81" stroke-width="1"/>
    <text x="264" y="197" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#6366f1">id₄</text>

    <!-- Tree edges (muted) -->
    <line x1="152" y1="72" x2="90" y2="104" stroke="#312e81" stroke-width="1" opacity="0.6"/>
    <line x1="152" y1="72" x2="214" y2="104" stroke="#312e81" stroke-width="1" opacity="0.6"/>
    <line x1="90" y1="136" x2="52" y2="179" stroke="#312e81" stroke-width="1" opacity="0.6"/>
    <line x1="90" y1="136" x2="128" y2="179" stroke="#312e81" stroke-width="1" opacity="0.6"/>
    <line x1="214" y1="136" x2="264" y2="179" stroke="#312e81" stroke-width="1" opacity="0.6"/>

    <!-- Proof path (highlighted) -->
    <line x1="192" y1="176" x2="214" y2="136" stroke="#818cf8" stroke-width="2" stroke-dasharray="5 3" opacity="0.9"/>
    <line x1="214" y1="104" x2="152" y2="72" stroke="#818cf8" stroke-width="2" stroke-dasharray="5 3" opacity="0.9"/>
    <line x1="214" y1="136" x2="214" y2="104" stroke="#818cf8" stroke-width="2" stroke-dasharray="5 3" opacity="0.9"/>

    <!-- "proof path" label -->
    <text x="240" y="165" font-family="ui-monospace, monospace" font-size="8" fill="#818cf8" opacity="0.7">proof</text>
    <text x="240" y="176" font-family="ui-monospace, monospace" font-size="8" fill="#818cf8" opacity="0.7">path</text>
  </g>
</svg>
